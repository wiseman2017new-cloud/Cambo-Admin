<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Driver Rating — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --ink: #0d0f12;
        --ink-mid: #3d4550;
        --ink-light: #8a93a0;
        --ink-ghost: #c8cfd8;
        --surface: #f4f5f7;
        --card: #ffffff;
        --border: #e8eaed;
        --accent: #10b981;
        --accent-dark: #059669;
        --accent-glow: rgba(16, 185, 129, 0.15);
        --red: #ef4444;
        --red-light: #fef2f2;
      }
      html, body {
        height: 100%;
        background: var(--ink);
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      /* ── Background ── */
      .bg {
        position: fixed;
        inset: 0;
        background: var(--ink);
        overflow: hidden;
      }
      .bg-glow-1 {
        position: absolute;
        top: -120px;
        left: -120px;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(16,185,129,0.18) 0%, transparent 70%);
        pointer-events: none;
      }
      .bg-glow-2 {
        position: absolute;
        bottom: -100px;
        right: -80px;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
        pointer-events: none;
      }
      .bg-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      /* ── Layout ── */
      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      /* ── Card ── */
      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: 20px;
        box-shadow: 0 24px 64px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.06) inset;
        overflow: hidden;
      }

      /* ── Card Header ── */
      .card-header {
        background: var(--ink);
        padding: 32px 36px 28px;
        position: relative;
        overflow: hidden;
      }
      .card-header::before {
        content: "";
        position: absolute;
        top: -60px; right: -60px;
        width: 180px; height: 180px;
        background: radial-gradient(circle, rgba(16,185,129,0.25) 0%, transparent 70%);
        pointer-events: none;
      }
      .logo-mark {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .logo-icon {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 14px rgba(16,185,129,0.4);
        flex-shrink: 0;
      }
      .logo-icon svg { width: 18px; height: 18px; color: #fff; }
      .logo-title {
        font-family: "Instrument Serif", serif;
        font-size: 18px;
        color: #fff;
        letter-spacing: -0.01em;
      }
      .logo-sub {
        font-size: 10px;
        color: rgba(255,255,255,0.3);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 600;
      }
      .header-headline {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      .header-sub {
        font-size: 13px;
        color: rgba(255,255,255,0.4);
        margin-top: 4px;
      }

      /* ── Card Body ── */
      .card-body {
        padding: 32px 36px 36px;
      }

      /* ── Form ── */
      .field { margin-bottom: 18px; }
      .field-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--ink-mid);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-icon {
        position: absolute;
        left: 13px;
        color: var(--ink-ghost);
        display: flex;
        pointer-events: none;
      }
      .input-icon svg { width: 16px; height: 16px; }
      .field input {
        width: 100%;
        height: 44px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 0 42px 0 38px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        color: var(--ink);
        background: var(--surface);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      }
      .field input::placeholder { color: var(--ink-ghost); }
      .field input:focus {
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      .field input.error {
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
      }

      /* Password toggle */
      .pw-toggle {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--ink-ghost);
        display: flex;
        padding: 4px;
        border-radius: 6px;
        transition: color 0.15s;
      }
      .pw-toggle:hover { color: var(--ink-mid); }
      .pw-toggle svg { width: 16px; height: 16px; }

      /* ── Error message ── */
      .error-msg {
        display: none;
        align-items: center;
        gap: 8px;
        background: var(--red-light);
        border: 1px solid rgba(239,68,68,0.2);
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 13px;
        color: var(--red);
        margin-bottom: 18px;
        font-weight: 500;
      }
      .error-msg.show { display: flex; }
      .error-msg svg { width: 15px; height: 15px; flex-shrink: 0; }

      /* ── Submit button ── */
      .btn-login {
        width: 100%;
        height: 46px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: #fff;
        border: none;
        border-radius: 12px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 16px rgba(16,185,129,0.35);
        transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
        position: relative;
        overflow: hidden;
        margin-top: 6px;
      }
      .btn-login:hover:not(:disabled) {
        opacity: 0.92;
        box-shadow: 0 6px 22px rgba(16,185,129,0.45);
        transform: translateY(-1px);
      }
      .btn-login:active:not(:disabled) { transform: translateY(0); }
      .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }
      .btn-login svg { width: 16px; height: 16px; }

      /* Spinner inside button */
      .spin {
        width: 16px; height: 16px;
        border: 2px solid rgba(255,255,255,0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 22px 0;
        color: var(--ink-ghost);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* ── Footer note ── */
      .login-footer {
        text-align: center;
        font-size: 12px;
        color: var(--ink-light);
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }
      .login-footer strong { color: var(--ink-mid); }

      /* ── Success state ── */
      .success-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 48px 36px;
      }
      .success-screen.show { display: flex; }
      .success-icon {
        width: 60px; height: 60px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 24px rgba(16,185,129,0.3);
        margin-bottom: 16px;
        animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
      }
      @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .success-icon svg { width: 28px; height: 28px; color: #fff; }
      .success-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
      .success-sub { font-size: 13px; color: var(--ink-light); }
      .success-redirect { font-size: 12px; color: var(--ink-ghost); margin-top: 14px; }

      /* Responsive */
      @media (max-width: 480px) {
        .card-header, .card-body { padding-left: 24px; padding-right: 24px; }
      }
    </style>
  </head>
  <body>
    <!-- Animated background -->
    <div class="bg">
      <div class="bg-grid"></div>
      <div class="bg-glow-1"></div>
      <div class="bg-glow-2"></div>
    </div>

    <div class="page">
      <div class="login-card">

        <!-- Header -->
        <div class="card-header">
          <div class="logo-mark">
            <div class="logo-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l1 1h10l2-4h2l1 1v3h-1"/>
              </svg>
            </div>
            <div>
              <div class="logo-title">Driver Rating</div>
              <div class="logo-sub">Admin Panel</div>
            </div>
          </div>
          <div class="header-headline">Welcome back</div>
          <div class="header-sub">Sign in to access your dashboard</div>
        </div>

        <!-- Login form -->
        <div class="card-body" id="loginForm">
          <div class="error-msg" id="errorMsg">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span id="errorText">Invalid email or password.</span>
          </div>

          <div class="field">
            <label class="field-label" for="emailInput">Email address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </span>
              <input type="email" id="emailInput" placeholder="admin@example.com" autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="passwordInput">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </span>
              <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
              <button class="pw-toggle" type="button" id="pwToggle" onclick="togglePassword()" title="Show/hide password">
                <svg id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
            </svg>
            Sign In
          </button>

          <div class="login-footer">
            Restricted access · <strong>Authorized admins only</strong>
          </div>
        </div>

        <!-- Success screen -->
        <div class="success-screen" id="successScreen">
          <div class="success-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <div class="success-title">Signed in!</div>
          <div class="success-sub">Welcome back, Admin</div>
          <div class="success-redirect">Redirecting to dashboard…</div>
        </div>

      </div>
    </div>

    <script>
      const supabaseUrl = "https://vioupfkhpdyfbuatjtxr.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpb3VwZmtocGR5ZmJ1YXRqdHhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTU0OTcsImV4cCI6MjA5MjkzMTQ5N30.KpQ3syRkSzCyPgkbeVX6OYY8pu13QshL-iQ2F48Vevk";
      const db = supabase.createClient(supabaseUrl, supabaseKey);

      // Check if already logged in
      (async () => {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
          window.location.href = "index.html";
        }
      })();

      // Enter key submits
      document.addEventListener("keydown", e => {
        if (e.key === "Enter") handleLogin();
      });

      function togglePassword() {
        const input = document.getElementById("passwordInput");
        const icon = document.getElementById("eyeIcon");
        const isText = input.type === "text";
        input.type = isText ? "password" : "text";
        icon.innerHTML = isText
          ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`
          : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
      }

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        document.getElementById("errorText").textContent = msg;
        el.classList.add("show");
        document.getElementById("emailInput").classList.add("error");
        document.getElementById("passwordInput").classList.add("error");
      }

      function clearError() {
        document.getElementById("errorMsg").classList.remove("show");
        document.getElementById("emailInput").classList.remove("error");
        document.getElementById("passwordInput").classList.remove("error");
      }

      async function handleLogin() {
        const email = document.getElementById("emailInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const btn = document.getElementById("loginBtn");

        clearError();

        if (!email) { showError("Please enter your email address."); return; }
        if (!password) { showError("Please enter your password."); return; }

        // Loading state
        btn.disabled = true;
        btn.innerHTML = `<div class="spin"></div> Signing in…`;

        try {
          const { data, error } = await db.auth.signInWithPassword({ email, password });

          if (error) {
            btn.disabled = false;
            btn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> Sign In`;
            showError(error.message === "Invalid login credentials"
              ? "Incorrect email or password. Please try again."
              : error.message);
            return;
          }

          // Success
          document.getElementById("loginForm").style.display = "none";
          document.getElementById("successScreen").classList.add("show");
          setTimeout(() => { window.location.href = "admin.html"; }, 1800);

        } catch (err) {
          btn.disabled = false;
          btn.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> Sign In`;
          showError("Something went wrong. Please try again.");
        }
      }
    </script>
  </body>
</html>
